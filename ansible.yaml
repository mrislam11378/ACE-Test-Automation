# Usage: ansible-playbook ansible.yaml -i "localhost," -c local

- name: Run ACE test projects
  hosts: all
  vars:
    # Required - Edit these values
    broker_name: "TestNode"
    eg_name: "TestServer"
    qm_name: "MYQMGR"
    test_script_dir: "/home/raiyan/ansible/"
    ace_profile: ". /opt/IBM/ace-12.0.12.22/server/bin/mqsiprofile"
    
    # File ownership
    file_owner: "raiyan"
    file_group: "mqbrkrs"

    # Optional - Uncomment to customize
    log_dir_base: "/tmp/GenTestRun" # example log_dir_base: "/tmp/{{ broker_name }}_{{ eg_name }}_{{ lookup('pipe', 'date +%F_%H%M%S') }}"
    # test_filter: "GenTest_*"
    # test_timeout: 60

    # Internal paths
    work_path: "/var/mqsi"
    dsn_src_path: "{{ work_path }}/registry/{{ broker_name }}/CurrentVersion/DSN"
    dsn_dest_path: "{{ work_path }}/components/{{ broker_name }}/servers/{{ eg_name }}/config/registry/integration_server/CurrentVersion/"

  tasks:
    - name: Stop Integration Server
      shell: "{{ ace_profile }} && ibmint stop server {{ eg_name }} --integration-node {{ broker_name }}"
      register: stop_result

    - debug: msg="{{ stop_result.stdout_lines }}"

    - name: Check if DSN directory exists
      stat:
        path: "{{ dsn_dest_path }}"
      register: dsn_check

    - name: Copy DSN directory if missing
      copy:
        src: "{{ dsn_src_path }}"
        dest: "{{ dsn_dest_path }}"
        remote_src: yes
        owner: "{{ file_owner }}"
        group: "{{ file_group }}"
        mode: '0775'
      when: not dsn_check.stat.exists

    - name: Run tests
      shell: >
        {{ ace_profile }} &&
        ./run_all_tests.sh {{ broker_name }} {{ eg_name }} {{ qm_name }}
        {{ '--log-base ' + log_dir_base if log_dir_base is defined else '' }}
        {{ '--test-filter ' + test_filter if test_filter is defined else '' }}
        {{ '--timeout ' + (test_timeout | string) if test_timeout is defined else '' }}
      args:
        chdir: "{{ test_script_dir }}"
      register: test_results
      ignore_errors: yes
      no_log: true

    - debug: msg="{{ test_results.stdout_lines }}"

    - name: Start Integration Server
      shell: "{{ ace_profile }} && ibmint start server {{ eg_name }} --integration-node {{ broker_name }}"
      register: start_result

    - debug: msg="{{ start_result.stdout_lines }}"
