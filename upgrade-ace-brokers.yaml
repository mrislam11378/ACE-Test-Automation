# Usage: ansible-playbook upgrade-ace-brokers.yaml -e "broker_list=broker1,broker2,broker3"
#
# This playbook upgrades specified ACE brokers by:
# 1. Validating brokers exist in mqsilist
# 2. Backing up each broker using the old ACE profile
# 3. Stopping each broker
# 4. Extracting components to the new broker using the new ACE profile

- name: Upgrade ACE Brokers
  hosts: p1318-pvm1.p1318.cecc.ihost.com
  become: true
  become_user: aceuser
  vars:
    # Required - Provide broker_list as comma-separated string or list
    broker_list: []
    old_ace_version: "12.0.12.22"
    new_ace_version: "13.0.6.2"
    
    # ACE profile paths
    old_ace_profile_path: "/opt/IBM/ace-{{ old_ace_version }}/server/bin/mqsiprofile"
    new_ace_profile_path: "/opt/IBM/ace-{{ new_ace_version }}/server/bin/mqsiprofile"
    old_ace_profile: ". {{ old_ace_profile_path }} > /dev/null 2>&1"
    new_ace_profile: ". {{ new_ace_profile_path }} > /dev/null 2>&1"
    
    # Backup configuration
    backup_base_path: "/tmp/mqiibbkp"
    
    # Extract options
    shared_workpath: "/var"
    overwrite_existing: true
    
    # Internal paths - Do not modify unless necessary
    components_dir: "{{ shared_workpath }}/components"
    shared_workpath_flag: "{% if shared_workpath is defined %}--shared-work-path {{ shared_workpath }}{% endif %}"
    overwrite_flag: "{% if overwrite_existing %}--overwrite-existing{% endif %}"
  
  tasks:
    - name: Generate timestamp
      set_fact:
        upgrade_timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"

    - name: Create backup directory
      file:
        path: "{{ backup_base_path }}"
        state: directory
        mode: '0755'

    - name: Get list of running brokers from mqsilist
      shell: |
        {{ old_ace_profile }}
        mqsilist | grep node | cut -d "'" -f2
      register: mqsilist_output
      changed_when: false
      failed_when: false

    - name: Set running brokers list
      set_fact:
        running_brokers: "{{ mqsilist_output.stdout_lines | default([]) }}"

    - name: Validate broker_list is provided
      assert:
        that:
          - broker_list is defined
          - broker_list | length > 0
        fail_msg: "broker_list is required. Provide as comma-separated string or list: -e 'broker_list=broker1,broker2'"

    - name: Convert broker_list from comma-separated string to list
      set_fact:
        broker_list: "{{ broker_list.split(',') | map('trim') | reject('equalto', '') | list }}"
      when: broker_list is string

    - name: Validate brokers exist in mqsilist
      assert:
        that:
          - item in running_brokers
        fail_msg: "Broker '{{ item }}' not found in mqsilist. Available brokers: {{ running_brokers | join(', ') }}"
      loop: "{{ broker_list }}"

    - name: Display upgrade configuration and brokers
      debug:
        msg:
          - "=========================================="
          - "ACE Broker Upgrade Configuration"
          - "=========================================="
          - "Old ACE Version     : {{ old_ace_version }}"
          - "New ACE Version     : {{ new_ace_version }}"
          - "Backup Location     : {{ backup_base_path }}"
          - "Shared Workpath     : {{ shared_workpath }}"
          - "Overwrite Existing  : {{ overwrite_existing }}"
          - "Timestamp           : {{ upgrade_timestamp }}"
          - "=========================================="
          - "Brokers to Upgrade  : {{ broker_list | join(', ') }}"
          - "Total Broker Count  : {{ broker_list | length }}"
          - "=========================================="

    - name: Backup and stop all brokers
      shell: |
        {{ old_ace_profile }}
        for b in {{ broker_list | join(' ') }}; do
          echo "Backing up broker: $b"
          mqsibackupbroker $b -d {{ backup_base_path }}/ -a ${b}_{{ upgrade_timestamp }}.zip
          echo "Stopping broker: $b"
          ibmint stop node $b
        done
      register: backup_stop_result
      ignore_errors: yes

    - debug:
        msg: "{{ backup_stop_result.stdout_lines }}"

    - name: Extract and migrate all brokers
      shell: |
        {{ new_ace_profile }}
        for b in {{ broker_list | join(' ') }}; do
          backup_file="{{ backup_base_path }}/${b}_{{ upgrade_timestamp }}.zip"
          trace_file="{{ backup_base_path }}/trace_${b}_{{ upgrade_timestamp }}.log"
          echo "Extracting broker: $b from $backup_file"
          ibmint extract node --backup-file "$backup_file" \
            --input-integration-node "$b" \
            --output-integration-node "$b" \
            --trace "$trace_file" \
            {{ shared_workpath_flag }} {{ overwrite_flag }}
        done | tee {{ backup_base_path }}/extract_{{ upgrade_timestamp }}.log
      register: extract_result
      ignore_errors: yes

    - debug:
        msg: "{{ extract_result.stdout_lines }}"

    - name: Upgrade summary
      debug:
        msg:
          - "=========================================="
          - "ACE Broker Upgrade Summary"
          - "=========================================="
          - "Status              : SUCCESS"
          - "Brokers Upgraded    : {{ broker_list | length }}"
          - "Broker Names        : {{ broker_list | join(', ') }}"
          - "Old Version         : {{ old_ace_version }}"
          - "New Version         : {{ new_ace_version }}"
          - "Backup Location     : {{ backup_base_path }}"
          - "Timestamp           : {{ upgrade_timestamp }}"
          - "=========================================="


